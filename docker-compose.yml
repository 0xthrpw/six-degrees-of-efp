services:
  postgres:
    image: postgres:16-alpine
    container_name: sdoe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdoe
      POSTGRES_PASSWORD: sdoe
      POSTGRES_DB: sdoe
    ports:
      - '5434:5432'
    volumes:
      - sdoe-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sdoe -d sdoe']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sdoe-pgdata:
